apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki-stack
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: loki-stack
    targetRevision: "2.10.3"
    helm:
      values: |
        loki:
          image:
            # Phase B: upgrade Loki first so TSDB storage is introduced on a supported runtime.
            tag: 2.9.3
          extraArgs:
            config.expand-env: "true"
          extraEnvFrom:
            - secretRef:
                # Manually apply this secret in the monitoring namespace.
                name: loki-minio-credentials
          persistence:
            enabled: true
            storageClassName: "nfs-client"
            size: 10Gi
          config:
            auth_enabled: false
            memberlist:
              join_members:
                - '{{ include "loki.fullname" . }}-memberlist'
            ingester:
              chunk_idle_period: 3m
              chunk_block_size: 262144
              chunk_retain_period: 1m
              max_transfer_retries: 0
              wal:
                dir: /data/loki/wal
              lifecycler:
                ring:
                  replication_factor: 1
            limits_config:
              enforce_metric_name: false
              reject_old_samples: true
              reject_old_samples_max_age: 168h
              max_entries_limit_per_query: 5000
            schema_config:
              configs:
                - from: "2020-10-24"
                  store: boltdb-shipper
                  object_store: filesystem
                  schema: v11
                  index:
                    prefix: index_
                    period: 24h
                - from: "2026-04-05"
                  # Phase C cutover date: 2026-04-05 00:00:00 UTC
                  # New writes switch to MinIO-backed TSDB from this UTC boundary onward.
                  store: tsdb
                  object_store: s3
                  schema: v13
                  index:
                    prefix: index_
                    period: 24h
            server:
              http_listen_port: 3100
              grpc_listen_port: 9095
            storage_config:
              boltdb_shipper:
                active_index_directory: /data/loki/boltdb-shipper-active
                cache_location: /data/loki/boltdb-shipper-cache
                cache_ttl: 24h
                shared_store: filesystem
              filesystem:
                directory: /data/loki/chunks
              tsdb_shipper:
                active_index_directory: /data/loki/tsdb-active
                cache_location: /data/loki/tsdb-cache
              aws:
                bucketnames: ${MINIO_LOKI_BUCKET}
                endpoint: ${MINIO_ENDPOINT}
                access_key_id: ${MINIO_ACCESS_KEY_ID}
                secret_access_key: ${MINIO_SECRET_ACCESS_KEY}
                insecure: true
                s3forcepathstyle: true
              # Keep the compactor local working directory on the existing PVC while
              # new TSDB indexes/chunks are shipped to MinIO after the cutover date.
            chunk_store_config:
              max_look_back_period: 0s
            table_manager:
              retention_deletes_enabled: false
              retention_period: 0s
            compactor:
              shared_store: s3
              working_directory: /data/loki/compactor
              compaction_interval: 5m
        grafana:
          enabled: true
          admin:
            existingSecret: "grafana-admin-credentials"
          persistence:
            type: pvc
            enabled: true
            storageClassName: "nfs-client"
            size: 5Gi
          dashboardProviders:
            dashboardproviders.yaml:
              apiVersion: 1
              providers:
                - name: 'default'
                  orgId: 1
                  folder: ''
                  type: file
                  disableDeletion: false
                  editable: true
                  options:
                    path: /var/lib/grafana/dashboards/default
          dashboards:
            default:
              node-exporter:
                gnetId: 1860
                revision: 37
                datasource: Prometheus
              kubernetes-workload-deployment:
                gnetId: 15758
                revision: 34
                datasource: Prometheus
              kubernetes-pods-by-namespace:
                gnetId: 15757
                revision: 37
                datasource: Prometheus
              loki-logs:
                gnetId: 13639
                revision: 2
                datasource: Loki
        prometheus:
          enabled: true
          server:
            persistentVolume:
              enabled: true
              storageClass: "nfs-client"
              size: 10Gi
          alertmanager:
            persistence:
              storageClass: "nfs-client"
              size: 2Gi
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
