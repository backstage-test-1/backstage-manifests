apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: backstage-techdocs-test
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/backstage-test-1/backstage-manifests.git
    targetRevision: feat/techdocs-remote-worker
    path: platform/backstage/overlays/techdocs-split-test
  destination:
    server: https://kubernetes.default.svc
    namespace: backstage-techdocs-test
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/template/spec/containers/0/imagePullPolicy
        - /spec/template/spec/containers/0/terminationMessagePath
        - /spec/template/spec/containers/0/terminationMessagePolicy
        - /spec/template/spec/dnsPolicy
        - /spec/template/spec/restartPolicy
        - /spec/template/spec/schedulerName
    - group: ""
      kind: Service
      jsonPointers:
        - /spec/clusterIP
        - /spec/clusterIPs
        - /spec/ipFamilies
        - /spec/ipFamilyPolicy
