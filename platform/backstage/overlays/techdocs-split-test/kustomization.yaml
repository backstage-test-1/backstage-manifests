apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: backstage-techdocs-test
resources:
  - ../../base
  - namespace.yaml
  - backstage-techdocs/deployment.yaml
  - backstage-techdocs/service.yaml
patches:
  - path: delete-base-namespace.yaml
  - path: patch-configmap-app-config.yaml
    target:
      kind: ConfigMap
      name: backstage-app-config
  - path: patch-ingress-backstage.yaml
    target:
      kind: Ingress
      name: backstage
  - path: patch-deployment-postgres.yaml
    target:
      kind: Deployment
      name: postgres
  - path: patch-deployment-backstage-backend.yaml
    target:
      kind: Deployment
      name: backstage-backend
  - path: patch-deployment-backstage-frontend.yaml
    target:
      kind: Deployment
      name: backstage-frontend
images:
  - name: ghcr.io/backstage-test-1/backstage-backend
    newTag: techdocs-remote-worker-test
  - name: ghcr.io/backstage-test-1/backstage-frontend
    newTag: techdocs-remote-worker-test
  - name: ghcr.io/backstage-test-1/backstage-techdocs
    newTag: techdocs-remote-worker-test
