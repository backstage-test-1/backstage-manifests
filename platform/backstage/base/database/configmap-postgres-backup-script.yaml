apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-backup-scripts
  namespace: backstage
data:
  dump-backups.sh: |
    #!/bin/sh
    set -eu

    export PGHOST="${POSTGRES_HOST:-postgres}"
    export PGPORT="${POSTGRES_PORT:-5432}"
    export PGUSER="${POSTGRES_USER:?POSTGRES_USER is required}"
    export PGPASSWORD="${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}"

    run_id="$(date -u +%Y%m%dT%H%M%SZ)"
    target_dir="/workdir/backup/${run_id}"
    database_list_file="${target_dir}/databases.txt"
    mkdir -p "${target_dir}"

    psql -d postgres -Atc "select datname from pg_database where datistemplate = false and datname <> 'postgres' order by datname;" > "${database_list_file}"

    while IFS= read -r db_name; do
      [ -n "${db_name}" ] || continue
      pg_dump \
        --clean \
        --if-exists \
        --format=custom \
        --dbname="${db_name}" \
        --file="${target_dir}/${db_name}.dump"
    done < "${database_list_file}"

    rm -f "${database_list_file}"
    globals_sql_file="${target_dir}/globals.sql"
    pg_dumpall --globals-only --clean --if-exists > "${globals_sql_file}"
    gzip -9 "${globals_sql_file}"

    (
      cd "${target_dir}"
      sha256sum * > SHA256SUMS
    )
  upload-backups.sh: |
    #!/bin/sh
    set -eu

    mc alias set backup "http://${MINIO_ENDPOINT:?MINIO_ENDPOINT is required}" "${MINIO_ACCESS_KEY_ID:?MINIO_ACCESS_KEY_ID is required}" "${MINIO_SECRET_ACCESS_KEY:?MINIO_SECRET_ACCESS_KEY is required}"

    bucket="${MINIO_BACKUP_BUCKET:?MINIO_BACKUP_BUCKET is required}"
    prefix="${MINIO_BACKUP_PREFIX:-backstage-postgres}"
    retention_days="${BACKUP_RETENTION_DAYS:-7}"

    mc mb --ignore-existing "backup/${bucket}"
    mc cp --recursive /workdir/backup/ "backup/${bucket}/${prefix}/"
    mc find "backup/${bucket}/${prefix}/" --older-than "${retention_days}d" --exec "mc rm --force {}"
