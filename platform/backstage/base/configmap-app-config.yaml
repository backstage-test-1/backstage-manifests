apiVersion: v1
kind: ConfigMap
metadata:
  name: backstage-app-config
  namespace: backstage
data:
  app-config.yaml: |
    app:
      # Replace the placeholder host before syncing to GitOps. The frontend still proxies /api/* to the internal backend service.
      title: Scaffolded Backstage App
      baseUrl: http://backstage.sth.com

    organization:
      name: My Company

    backend:
      # Keep the same public origin as the frontend so auth callbacks and absolute links continue to use a single origin.
      baseUrl: http://backstage.sth.com
      listen:
        port: 7007
      csp:
        connect-src: ["'self'", 'http:', 'https:']
        upgrade-insecure-requests: false
      cors:
        # Browser traffic originates from the public Backstage ingress host.
        origin: http://backstage.sth.com
        methods: [GET, HEAD, PATCH, POST, PUT, DELETE]
        credentials: true
      database:
        client: pg
        connection:
          host: ${POSTGRES_HOST}
          port: ${POSTGRES_PORT}
          user: ${POSTGRES_USER}
          password: ${POSTGRES_PASSWORD}

    integrations:
      github:
        - host: github.com
          token: ${GITHUB_TOKEN}

    proxy:
      ### Example for how to add a proxy endpoint for the frontend.
      # endpoints:
      #   '/test':
      #     target: 'https://example.com'
      #     changeOrigin: true

    techdocs:
      builder: 'external'
      generator:
        runIn: 'local'
      publisher:
        type: 'azureBlobStorage'
        azureBlobStorage:
          containerName: 'techdocs-container'
          credentials:
            accountName: 'backstagetechdocs01'

    auth:
      environment: development
      providers:
        guest:
          dangerouslyAllowOutsideDevelopment: true
          userEntityRef: user:default/guest
        github:
          development:
            clientId: ${AUTH_GITHUB_CLIENT_ID}
            clientSecret: ${AUTH_GITHUB_CLIENT_SECRET}
            signIn:
              resolvers:
                - resolver: usernameMatchingUserEntityName
          production:
            clientId: ${AUTH_GITHUB_CLIENT_ID}
            clientSecret: ${AUTH_GITHUB_CLIENT_SECRET}
            signIn:
              resolvers:
                - resolver: usernameMatchingUserEntityName

    scaffolder:
      # see https://backstage.io/docs/features/software-templates/configuration for software template options

    catalog:
      import:
        entityFilename: catalog-info.yaml
        pullRequestBranchName: backstage-integration
      rules:
        - allow: [Component, System, API, Resource, Location]
      locations:
        # Example data referenced via GitHub URL (not baked into image)
        - type: url
          target: https://github.com/backstage-test-1/backstage-app/blob/main/examples/entities.yaml

        - type: url
          target: https://github.com/backstage-test-1/backstage-app/blob/main/examples/template/template.yaml
          rules:
            - allow: [Template]

        # Node.js API template
        - type: url
          target: https://github.com/backstage-test-1/backstage-app/blob/main/templates/node-api/template.yaml
          rules:
            - allow: [Template]

        # System template
        - type: url
          target: https://github.com/backstage-test-1/backstage-app/blob/main/templates/system/template.yaml
          rules:
            - allow: [Template]

        # Vue.js Frontend template
        - type: url
          target: https://github.com/backstage-test-1/backstage-app/blob/main/templates/vue-frontend/template.yaml
          rules:
            - allow: [Template]

        # Logical systems location
        - type: url
          target: https://github.com/backstage-test-1/backstage-app/blob/main/catalog/systems/
          rules:
            - allow: [System]

        - type: url
          target: https://github.com/backstage-test-1/backstage-app/blob/main/examples/org.yaml
          rules:
            - allow: [User, Group]

        # backstage-app repository catalog
        - type: url
          target: https://github.com/backstage-test-1/backstage-app/blob/main/catalog-info.yaml

        # backstage-manifests GitOps repository (Resource kind)
        - type: url
          target: https://github.com/backstage-test-1/backstage-manifests/blob/main/catalog-info.yaml

    kubernetes:
      # see https://backstage.io/docs/features/kubernetes/configuration for kubernetes configuration options

    permission:
      enabled: true

    argocd:
      appLocatorMethods:
        - type: 'config'
          instances:
            - name: argoInstance1
              url: ${ARGOCD_URL}
              token: ${ARGOCD_AUTH_TOKEN}
              skipTLSVerify: true
