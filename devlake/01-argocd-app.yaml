apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: devlake
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://apache.github.io/incubator-devlake-helm-chart
    chart: devlake
    targetRevision: "1.0.3-beta9"
    helm:
      values: |
        lake:
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "512Mi"
          # DevLake startup can take long while loading plugins.
          # Relax probes to avoid premature restarts during boot.
          readinessProbe:
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 12
            timeoutSeconds: 5
          livenessProbe:
            initialDelaySeconds: 180
            periodSeconds: 10
            failureThreshold: 6
            timeoutSeconds: 5
          encryptionSecret:
            secretName: devlake-encryption-secret
            autoCreateSecret: false
        ui:
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
        mysql:
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
          storage:
            class: "nfs-client"
            size: 5Gi
          # NO_ZERO_DATE, NO_ZERO_IN_DATE 제거 → token_expires_at 0000-00-00 허용
          extraArgs:
            - --sql-mode=ONLY_FULL_GROUP_BY,STRICT_TRANS_TABLES,ERROR_FOR_DIVISION_BY_ZERO,NO_ENGINE_SUBSTITUTION

        service:
          type: ClusterIP

        ingress:
          enabled: true
          enableHttps: false
          className: nginx
          # Replace the placeholder host before syncing to GitOps.
          hostname: devlake.sth.com

        grafana:
          service:
            type: ClusterIP
          # During the HTTP phase, Grafana is exposed through the same host under /grafana.
          grafana.ini:
            server:
              serve_from_subpath: "true"
              root_url: "http://devlake.sth.com/grafana"
          # DORA 대시보드는 DevLake MySQL에 저장되므로 Grafana 자체 PV 불필요
          # non-root 정책 + local-path PV 권한 문제를 persistence 비활성화로 우회
          persistence:
            enabled: false
          initChownData:
            enabled: false

        # 암호화 키: K8s Secret으로 분리 (값을 git에 커밋하지 않기 위해)
        # autoCreateSecret: false → validate.yaml 검증 우회
        # 배포 전 아래 명령어로 Secret을 미리 생성해야 함:
        #   kubectl create secret generic devlake-encryption-secret -n devlake \
        #     --from-literal=ENCRYPTION_SECRET=$(openssl rand -base64 2000 | tr -dc 'A-Z' | fold -w 128 | head -n 1)

  destination:
    server: https://kubernetes.default.svc
    namespace: devlake

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
