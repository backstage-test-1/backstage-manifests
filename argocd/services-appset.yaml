apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: services-appset
  namespace: argocd
spec:
  # кё°мЎҙ мҲҳлҸҷ мғқм„ұ Applicationмқҙ мһҲм–ҙлҸ„ ApplicationSetмқҙ мқёмҲҳ(adopt)н•ҳлҸ„лЎқ н—Ҳмҡ©
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]

  generators:
    - scmProvider:
        github:
          organization: backstage-test-1
          tokenRef:
            secretName: argocd-github-token
            key: token
          # forkлҗң л ҲнҸ¬ м ңмҷё
          allBranches: false
        # k8s/ нҸҙлҚ”к°Җ мһҲлҠ” л ҲнҸ¬л§Ң лҢҖмғҒмңјлЎң н•Ё
        # (backstage-app, backstage-manifests л“ұ k8s/ м—ҶлҠ” л ҲнҸ¬лҠ” мһҗлҸҷ м ңмҷё)
        filters:
          - pathsExist: ["k8s"]

  # ApplicationSetмқҙ мӮӯм ңлҗ  л•Ң мғқм„ұн•ң ApplicationлҸ„ н•Ёк»ҳ мӮӯм ң
  syncPolicy:
    preserveResourcesOnDeletion: false

  template:
    metadata:
      name: "{{ .repository }}"
      # ApplicationSetмқҙ кҙҖлҰ¬н•ҳлҠ” Applicationмһ„мқ„ н‘ңмӢң
      labels:
        managed-by: services-appset
    spec:
      project: default

      source:
        repoURL: "https://github.com/{{ .organization }}/{{ .repository }}"
        targetRevision: main
        path: k8s
        directory:
          # argocd-app.yamlмқ„ л°°нҸ¬ лҢҖмғҒм—җм„ң м ңмҷё: services-appsetмқҙ Application CRDлҘј мһҗлҸҷ мғқм„ұн•ҳлҜҖлЎң
          # мҠӨмјҲл ҲнҶӨмқҳ argocd-app.yamlмқҙ лҸҷмқј мқҙлҰ„мқҳ Applicationмқ„ лҚ®м–ҙмҚЁ OutOfSync лЈЁн”„к°Җ л°ңмғқн•Ё
          exclude: 'argocd-app.yaml'

      destination:
        server: https://kubernetes.default.svc
        namespace: default

      syncPolicy:
        automated:
          prune: true      # k8s/м—җм„ң мӮӯм ңлҗң лҰ¬мҶҢмҠӨлҠ” нҒҙлҹ¬мҠӨн„°м—җм„ңлҸ„ м ңкұ°
          selfHeal: true   # мҲҳлҸҷ kubectl ліҖкІҪ мӢң ArgoCDк°Җ мӣҗліө
        syncOptions:
          - ServerSideApply=true   # л§ӨлӢҲнҺҳмҠӨнҠё м¶©лҸҢ л°©м§Җ
          - RespectIgnoreDifferences=true  # ignoreDifferences н•ӯлӘ©мқҖ sync лҢҖмғҒм—җм„ңлҸ„ м ңмҷё

      # ServerSideApply мӮ¬мҡ© мӢң Kubernetes apiserverк°Җ manifestм—җ м—ҶлҠ” н•„л“ңлҘј мһҗлҸҷ мЈјмһ…н•ҳм—¬
      # sync м§Ғнӣ„м—җлҸ„ OutOfSync лЈЁн”„к°Җ л°ңмғқн•ҳлҠ” л¬ём ңлҘј л°©м§Җ
      ignoreDifferences:
        - group: apps
          kind: Deployment
          jsonPointers:
            - /spec/template/spec/containers/0/imagePullPolicy
            - /spec/template/spec/containers/0/terminationMessagePath
            - /spec/template/spec/containers/0/terminationMessagePolicy
            - /spec/template/spec/dnsPolicy
            - /spec/template/spec/restartPolicy
            - /spec/template/spec/schedulerName
        - group: ""
          kind: Service
          jsonPointers:
            - /spec/clusterIP
            - /spec/clusterIPs
            - /spec/ipFamilies
            - /spec/ipFamilyPolicy
